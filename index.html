<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DavSearch</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <link rel="stylesheet" href="/src/styles/base.css">;



</head>

<body>

    <!-- ═══════════════ HOME PAGE ═══════════════ -->
    <div id="homePage">
        <div class="home-logo">
            <span class="logo-d">D</span><span class="logo-a">a</span><span class="logo-v">v</span><span
                class="logo-s">S</span><span class="logo-e2">e</span><span class="logo-a">a</span><span
                class="logo-r">r</span><span class="logo-c">c</span><span class="logo-h">h</span>
        </div>

        <div class="search-bar-wrap" id="homeBarWrap">
            <div class="search-bar" id="homeBar">
                <span class="material-symbols-outlined">
                    search
                </span>
                <input class="search-input" id="homeInput" placeholder="Search your documents…" autocomplete="on">
                <div class="search-bar-right">
                    <button class="icon-btn" id="homeClear" title="Clear" style="display:none">✕</button>
                    <div class="divider-v"></div>
                    <button class="icon-btn" title="Search" onclick="triggerSearch()">→</button>
                </div>
            </div>
            <div class="suggestions-box" id="homeSuggestions"></div>
        </div>

        <div class="home-buttons">
            <button class="home-btn" onclick="loadSampleData()"> Load Sample Data</button>
        </div>

        <div style="margin-top: 32px; font-size: 13px; color: var(--text-dim); text-align: center; max-width: 420px;">
            Drop a <span style="color:var(--text-muted)">.txt</span> or <span style="color:var(--text-muted)">.md</span>
            file anywhere ·
            TF-IDF scoring · Fuzzy typo tolerance
        </div>
    </div>

    <!-- ═══════════════ RESULTS PAGE ═══════════════ -->
    <div id="resultsPage">

        <!-- STICKY HEADER -->
        <div class="results-header">
            <a class="results-logo" onclick="goHome()" style="cursor:pointer; text-decoration:none;">
                <span class="logo-n">N</span><span class="logo-e">e</span><span class="logo-x">x</span>
            </a>

            <div class="search-bar-wrap" id="resultsBarWrap">
                <div class="search-bar no-suggest" id="resultsBar">
                    <span class="search-icon-left">🔍</span>
                    <input class="search-input" id="resultsInput" placeholder="Search your documents…"
                        autocomplete="off">
                    <div class="search-bar-right">
                        <button class="icon-btn" id="resultsClear" title="Clear" style="display:none">✕</button>
                        <div class="divider-v"></div>
                        <button class="icon-btn" title="Search" onclick="triggerSearch()">→</button>
                    </div>
                </div>
                <div class="suggestions-box" id="resultsSuggestions"></div>
            </div>

            <div class="header-icons">
                <button class="icon-btn" title="Upload files"
                    onclick="document.getElementById('fileInput').click()">+</button>
                <input type="file" id="fileInput" multiple accept=".txt,.md" style="display:none"
                    onchange="handleFileInput(this.files)">
            </div>
        </div>

        <!-- TABS -->
        <div class="results-tabs">
            <div class="tab active"> Documents</div>
            <div class="tab"> Vocabulary</div>
            <div class="tab"> Index</div>
        </div>

        <!-- BODY -->
        <div class="results-body">

            <!-- MAIN RESULTS -->
            <div class="results-main">
                <div class="results-meta" id="resultsMeta"></div>
                <div id="correctionBanner" style="display:none" class="correction-chip">
                    ⚠ Showing results for: <strong id="correctionWord"></strong>&nbsp;
                    <span class="apply-fix" id="applyFix">Search instead for original →</span>
                </div>
                <div id="resultsList"></div>
            </div>

            <!-- SIDEBAR -->
            <div class="results-sidebar">

                <!-- STATS -->
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="s-val" id="sDocCount">0</div>
                        <div class="s-label">Docs indexed</div>
                    </div>
                    <div class="stat-box">
                        <div class="s-val" id="sVocabCount">0</div>
                        <div class="s-label">Unique terms</div>
                    </div>
                    <div class="stat-box">
                        <div class="s-val" id="sQueryTime">—</div>
                        <div class="s-label">Query time</div>
                    </div>
                    <div class="stat-box">
                        <div class="s-val" id="sResultCount">—</div>
                        <div class="s-label">Results found</div>
                    </div>
                </div>



                <!-- QUERY HISTORY -->
                <div class="sidebar-section">
                    <div class="sidebar-title">Recent Searches</div>
                    <div id="historyList"></div>
                </div>

                <!-- INDEX VIEWER -->
                <div class="sidebar-section">
                    <div class="index-panel">
                        <div class="index-panel-header">
                            <span> Live Index</span>
                            <span id="indexTermCount" style="color:var(--text-dim)">0 terms</span>
                        </div>
                        <div class="index-panel-body" id="indexBody"></div>
                    </div>
                </div>

                <!-- DOWNLOAD -->
                <button class="download-btn" onclick="downloadReport()">⬇ Download Search Report</button>

            </div>
        </div>
    </div>

    <!-- ═══════════════ DOCUMENT VIEWER MODAL ═══════════════ -->
    <div class="doc-viewer-overlay" id="docViewerOverlay" onclick="closeViewer(event)">
        <div class="doc-viewer" onclick="event.stopPropagation()">
            <div class="doc-viewer-header">
                <div class="doc-viewer-title" id="viewerTitle">document.txt</div>
                <div class="viewer-match-nav">
                    <span id="viewerMatchInfo"
                        style="font-size:12px; font-family:var(--mono); color:var(--text-muted)"></span>
                    <button class="match-nav-btn" id="viewerPrev" onclick="navigateViewerMatch(-1)">↑</button>
                    <button class="match-nav-btn" id="viewerNext" onclick="navigateViewerMatch(1)">↓</button>
                </div>
                <button class="icon-btn" onclick="closeViewer()" style="margin-left:8px;">✕</button>
            </div>
            <div class="doc-viewer-body" id="viewerBody"></div>
        </div>
    </div>

    <script src="src/engine/engine.js"></script>

</body>

</html>
